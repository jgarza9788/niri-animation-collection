name: Comment Ratio Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  comment-ratio:
    name: Verify comment ratio >= 5%
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Count .kdl comment and total lines
        run: |
          set -o pipefail
          # find all .kdl files
          files=$(find . -type f -name '*.kdl' -print)
          if [ -z "${files}" ]; then
            echo "No .kdl files found; skipping comment ratio check."
            exit 0
          fi

          total=0
          comments=0
          while IFS= read -r -d '' f; do
            # count total lines
            t=$(wc -l < "$f" || echo 0)
            # comments: lines starting with //, #, ; optionally preceded by whitespace
            c=$(grep -h -E '^[[:space:]]*(//|#|;)' "$f" | wc -l || true)
            total=$((total + t))
            comments=$((comments + c))
          done < <(find . -type f -name '*.kdl' -print0)

          echo "kdl total lines: $total"
          echo "kdl comment lines: $comments"

          if [ "$total" -eq 0 ]; then
            echo "No code lines detected in .kdl files; skipping check."
            exit 0
          fi

          perc=$(awk -v c="$comments" -v t="$total" 'BEGIN{printf("%.2f", (c/t)*100)}')
          echo "Comment ratio: $perc%"

          required=5
          ok=$(awk -v p="$perc" -v r="$required" 'BEGIN{print (p+0 >= r) ? 0 : 1}')
          if [ "$ok" -ne 0 ]; then
            echo "Comment ratio $perc% is less than required ${required}%"
            exit 1
          fi

      - name: Success
        if: always()
        run: echo "Comment ratio requirement satisfied."
